version: '3.8'

services:
  mongodb:
    image: mongo:8.0
    container_name: react-admin-mongodb-prod
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_prod:/data/db
      - mongodb_config_prod:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: react-admin-demo
    networks:
      - react-admin-network-prod
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: react-admin-server-prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      MONGODB_URI: mongodb://mongodb:27017/react-admin-demo
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-use-env-file}
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - react-admin-network-prod
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      replicas: 1

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: react-admin-web-prod
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - react-admin-network-prod
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
      replicas: 1

networks:
  react-admin-network-prod:
    driver: bridge

volumes:
  mongodb_data_prod:
  mongodb_config_prod:
