version: '3.8'

services:
  mongodb:
    image: mongo:8.0
    container_name: react-admin-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_dev:/data/db
    environment:
      MONGO_INITDB_DATABASE: react-admin-demo
    networks:
      - react-admin-network-dev
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../server
      dockerfile: Dockerfile.dev
    container_name: react-admin-server-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../server:/app
      - /app/node_modules
    environment:
      PORT: 8000
      MONGODB_URI: mongodb://mongodb:27017/react-admin-demo
      JWT_SECRET: demo-jwt-secret-key-change-in-production
      NODE_ENV: development
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - react-admin-network-dev
    command: pnpm run dev

  web:
    build:
      context: ../web
      dockerfile: Dockerfile.dev
    container_name: react-admin-web-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ../web:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - server
    networks:
      - react-admin-network-dev
    command: pnpm run dev -- --host

networks:
  react-admin-network-dev:
    driver: bridge

volumes:
  mongodb_data_dev:
